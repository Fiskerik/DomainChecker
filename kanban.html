<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pipeline CRM — Kanban</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --header-h: 56px;
      --col-min: 148px;
      --col-gap: 8px;
    }

    body {
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      background: #F1F5F9;
      color: #1E293B;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Top bar ───────────────────────────────────────────── */
    #kb-header {
      height: var(--header-h);
      background: #0F1923;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      flex-shrink: 0;
    }
    #kb-logo { display: flex; align-items: center; gap: 8px; color: #F0F6FF; font-size: 15px; font-weight: 700; }
    .kb-logo-dot { width: 8px; height: 8px; border-radius: 50%; background: #22C55E; }
    #kb-sub { font-size: 11px; color: #7A9BB8; margin-left: 4px; }
    #kb-actions { margin-left: auto; display: flex; gap: 8px; }
    .kb-btn {
      font-size: 11px; font-weight: 600; padding: 5px 12px;
      border: 1px solid #2D4A63; border-radius: 6px;
      background: transparent; color: #A8C4E0; cursor: pointer;
      transition: background 0.12s;
    }
    .kb-btn:hover { background: #1A2C3D; }

    /* ── Board ─────────────────────────────────────────────── */
    /* FIX 4: Use CSS grid with auto-fit so all 7 columns always
       fit the window width. Each column gets an equal share of
       the available space, with a minimum so they stay readable. */
    #board {
      flex: 1;
      display: grid;
      /* Always show all columns; each shrinks equally */
      grid-template-columns: repeat(7, minmax(var(--col-min), 1fr));
      gap: var(--col-gap);
      padding: 12px;
      align-items: start;
      overflow-x: auto;           /* fallback if viewport is very narrow */
      min-height: calc(100vh - var(--header-h));
    }

    /* ── Column ────────────────────────────────────────────── */
    .kb-col {
      background: #E8EDF3;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      max-height: calc(100vh - var(--header-h) - 24px);
      border: 1.5px solid #D5DCE6;
      overflow: hidden;
    }
    .kb-col.drag-over { outline: 2px dashed #3B82F6; outline-offset: -4px; }

    .kb-col-header {
      padding: 8px 10px 6px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--sc);
      display: flex;
      align-items: center;
      gap: 6px;
      border-bottom: 1.5px solid #D5DCE6;
      flex-shrink: 0;
      background: #F0F4F8;
    }
    .kb-col-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--sc); flex-shrink: 0;
    }
    .kb-col-count {
      margin-left: auto;
      background: var(--sc); color: #fff;
      font-size: 9px; padding: 1px 5px;
      border-radius: 8px; font-weight: 700;
    }

    /* ── Cards ─────────────────────────────────────────────── */
    .kb-list {
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow-y: auto;
      flex: 1;
      min-height: 60px;
    }
    .kb-list::-webkit-scrollbar { width: 3px; }
    .kb-list::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 3px; }

    .kb-card {
      background: white;
      border-radius: 6px;
      border-left: 3px solid var(--sc);
      padding: 8px 9px;
      cursor: grab;
      font-size: 12px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.08);
      transition: transform 0.08s, box-shadow 0.08s;
    }
    .kb-card:hover { transform: translateY(-1px); box-shadow: 0 3px 8px rgba(0,0,0,0.12); }
    .kb-card.dragging { opacity: 0.45; cursor: grabbing; }

    .kb-card-name { font-weight: 600; font-size: 12px; margin-bottom: 2px; line-height: 1.3; word-break: break-word; }
    .kb-card-role { font-size: 10px; color: #64748B; margin-bottom: 5px; line-height: 1.3; word-break: break-word; }
    .kb-card-notes { font-size: 10px; color: #475569; line-height: 1.4; margin-bottom: 5px; word-break: break-word; }

    .kb-card-footer { display: flex; align-items: center; justify-content: space-between; gap: 4px; flex-wrap: wrap; }

    .kb-open-btn {
      font-size: 10px; font-weight: 600; color: #3B82F6;
      background: none; border: none; cursor: pointer;
      padding: 0; font-family: inherit;
    }
    .kb-open-btn:hover { text-decoration: underline; }

    .kb-due { font-size: 9px; padding: 1px 5px; border-radius: 6px; border: 1px solid #E2E8F0; color: #64748B; white-space: nowrap; }
    .kb-due.overdue { border-color: #FECACA; color: #DC2626; background: #FEF2F2; font-weight: 700; }

    .kb-empty {
      font-size: 10px; color: #94A3B8; text-align: center;
      padding: 12px 6px; border: 1px dashed #CBD5E1;
      border-radius: 6px; background: #F8FAFC;
    }
  </style>
</head>
<body>
  <header id="kb-header">
    <div id="kb-logo">
      <span class="kb-logo-dot"></span>
      Pipeline Kanban
      <span id="kb-sub">loading…</span>
    </div>
    <div id="kb-actions">
      <button class="kb-btn" id="kb-refresh">Refresh</button>
      <button class="kb-btn" id="kb-open-li">Open LinkedIn</button>
    </div>
  </header>
  <main id="board"></main>
  <script src="kanban.js"></script>
</body>
</html>
