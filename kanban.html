<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pipeline CRM — Kanban Board</title>
  <style>
    :root {
      --bg: #f4f5f7;
      --panel: #ffffff;
      --muted: #5e6c84;
      --text: #172b4d;
      --line: #dfe1e6;
      --shadow: 0 1px 1px rgba(9, 30, 66, .15), 0 0 1px rgba(9, 30, 66, .31);
      --col-width: 280px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #e9edf3 0%, var(--bg) 120px);
      min-height: 100vh;
    }

    .kb-topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(6px);
      border-bottom: 1px solid var(--line);
    }

    .kb-title-wrap { display: flex; align-items: center; gap: 10px; }
    .kb-dot { width: 10px; height: 10px; border-radius: 50%; background: #2684ff; }
    .kb-title { font-size: 18px; font-weight: 700; margin: 0; }
    .kb-sub { color: var(--muted); font-size: 12px; }

    .kb-actions { display: flex; gap: 8px; }
    .kb-btn {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      font-weight: 600;
    }
    .kb-btn:hover { background: #f7f8fa; }

    #board {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      overflow-x: auto;
      padding: 16px 20px 20px;
      min-height: calc(100vh - 72px);
    }

    .kb-column {
      width: var(--col-width);
      min-width: var(--col-width);
      background: #ebecf0;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      max-height: calc(100vh - 110px);
      border: 1px solid #e1e4ea;
    }

    .kb-column.drag-over {
      outline: 2px dashed #2684ff;
      outline-offset: -6px;
      background: #e2e8f5;
    }

    .kb-column-header {
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #d6dae1;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .03em;
      color: #44546f;
    }

    .kb-stage-pill {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--sc);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--sc) 25%, transparent);
    }

    .kb-count {
      margin-left: auto;
      font-size: 11px;
      background: #dfe1e6;
      border-radius: 999px;
      padding: 1px 7px;
      color: #42526e;
    }

    .kb-list {
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 90px;
    }

    .kb-card {
      background: #fff;
      border-radius: 8px;
      border-left: 4px solid var(--sc);
      box-shadow: var(--shadow);
      padding: 10px;
      cursor: grab;
      transition: transform .08s ease, box-shadow .08s ease;
    }

    .kb-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 2px 6px rgba(9, 30, 66, .25);
    }

    .kb-card.dragging { opacity: .5; }
    .kb-card-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    .kb-card-title { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .kb-card-notes { font-size: 12px; color: #253858; line-height: 1.35; white-space: pre-wrap; }
    .kb-card-meta { margin-top: 8px; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .kb-link { color: #0052cc; font-size: 12px; text-decoration: none; font-weight: 600; }
    .kb-link:hover { text-decoration: underline; }
    button.kb-link {
      border: none;
      background: transparent;
      padding: 0;
      cursor: pointer;
      font-family: inherit;
      text-align: left;
    }

    .kb-due {
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 999px;
      border: 1px solid #dfe1e6;
      color: #42526e;
      background: #f7f8fa;
    }

    .kb-due.overdue {
      border-color: #ffbdad;
      color: #bf2600;
      background: #ffebe6;
      font-weight: 700;
    }

    .kb-empty {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      background: #fff;
      border-radius: 8px;
      padding: 14px 10px;
      border: 1px dashed #c1c7d0;
    }
  </style>
</head>
<body>
  <header class="kb-topbar">
    <div class="kb-title-wrap">
      <span class="kb-dot"></span>
      <div>
        <h1 class="kb-title">Pipeline Kanban</h1>
        <div id="kb-sub" class="kb-sub">0 tracked conversations</div>
      </div>
    </div>
    <div class="kb-actions">
      <button id="kb-refresh" class="kb-btn">Refresh</button>
      <button id="kb-open-li" class="kb-btn">Open LinkedIn</button>
    </div>
  </header>

  <main id="board"></main>

  <script src="kanban.js"></script>
</body>
</html>
